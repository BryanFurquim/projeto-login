<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media.css">
</head>
<body>
    <main>
        <section id="login" >
            <div id="img">
               
            </div>

            <div id="forms">
                <h1>Login</h1>
                <p>Seja bem-vindo(a). Faça login para acessar sua conta e poder fazer as configurações no seu ambiente</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div>
                        <i class="material-symbols-outlined">person</i>
                         <input class="resp" type="email" name="email" id="imail" placeholder="Seu e-mail" autocomplete="email" required>
                         <label for="imail">Usuário </label>
                    </div>
                    <div>
                         <i class="material-symbols-outlined">vpn_key</i>
                        <input class="resp" type="password" name="senha" id="isenha" placeholder="Sua senha" autocomplete="current-password" required>
                        <label for="isenha">Senha</label>
                    </div>
                    <input class="enviar" type="submit" value="Enviar">
                    <a class="enviar" href="esqueci.html">Esqueci a senha <i id="mail" class="material-symbols-outlined" >stacked_email</i></a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
